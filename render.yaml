services:
  - type: web
    name: erp-simple-api
    env: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: erp-simple-db
          property: connectionString

databases:
  - name: erp-simple-db
    plan: free
